<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇼 台灣-訂單管理</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge { font-size: 8px; padding: 2px 4px; border-radius: 4px; color: white; font-weight: 900; }
        .badge-待預購 { background: #EC4899; }
        .badge-待取貨 { background: #F59E0B; }
        .badge-已取貨 { background: #10B981; }
        .badge-已寄出 { background: #9CA3AF; }
        .source-IG { background-color: #E1306C; color: white; }
        .source-WhatsApp { background-color: #22C55E; color: white; }
        .source-Threads { background-color: #000000; color: white; }
        #copyModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
        .card-ready-to-ship { border: 2px solid #EF4444 !important; background-color: #FEF2F2 !important; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20 font-sans text-gray-900">

    <div id="copyModal">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-lg font-black mb-4">📦 寄出成功！</h3>
            <textarea id="modalCopyText" class="w-full h-32 p-4 border rounded-2xl text-[12px] bg-gray-50 mb-4 outline-none" readonly></textarea>
            <button onclick="copyAndClose()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">一鍵複製並關閉</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 space-y-6">
        <div class="flex flex-col md:flex-row items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🇹🇼</span>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">台灣-訂單管理</h1>
            </div>
            <nav class="flex bg-gray-100 p-1 rounded-xl">
                <button onclick="switchView('active')" id="nav-active" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600">進行中</button>
                <button onclick="switchView('history')" id="nav-history" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">歷史訂單</button>
                <button onclick="switchView('profit')" id="nav-profit" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">💰 利潤統計</button>
            </nav>
        </div>

        <section id="stat-section" class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
            <div id="summary-container" class="grid grid-cols-2 md:grid-cols-6 gap-3"></div>
            <div id="filter-details" class="hidden mt-6 pt-6 border-t border-white/10">
                <h3 id="filter-title" class="text-sm font-bold mb-4 text-blue-400 italic"></h3>
                <div id="filter-items-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3"></div>
            </div>
        </section>

        <section id="add-section" class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">客戶資訊</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱" class="border-b p-2 outline-none text-sm font-bold">
                        <select id="source" class="border-b p-2 outline-none text-sm font-bold">
                            <option value="IG">IG</option><option value="WhatsApp">WhatsApp</option><option value="Threads">Threads</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="receiver" placeholder="收件人姓名" class="border-b p-2 outline-none text-sm font-bold">
                        <input type="text" id="phone" placeholder="電話號碼" class="border-b p-2 outline-none text-sm">
                    </div>
                    <div class="relative">
                        <textarea id="fullAddress" placeholder="輸入地址或點碼..." class="w-full border p-3 rounded-2xl h-24 text-xs bg-gray-50 outline-none pr-16"></textarea>
                        <button onclick="searchSFAddress()" class="absolute right-2 top-2 bg-blue-100 text-blue-600 px-2 py-1 rounded-lg text-[10px] font-bold">搜尋點碼</button>
                    </div>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center"><p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">商品明細</p><button onclick="addItemRow()" class="text-blue-600 text-[10px] font-black underline">+ 增加品項</button></div>
                    <div id="itemsContainer" class="space-y-3 max-h-[350px] overflow-y-auto pr-2">
                        <div class="item-row bg-gray-50 p-4 rounded-2xl border border-gray-100 relative">
                            <input type="text" placeholder="商品名稱" class="prodName w-full mb-3 p-2 rounded-lg border text-sm">
                            <div class="grid grid-cols-3 gap-2">
                                <select onchange="handleLocChange(this)" class="prodLoc border p-2 rounded-lg text-[10px]">
                                    <option value="蝦皮">蝦皮</option><option value="7-11">7-11</option><option value="全家">全家</option><option value="宅配">宅配</option><option value="7仔預購">7仔預購</option><option value="賣貨便">賣貨便</option>
                                </select>
                                <input type="number" placeholder="金額" class="prodAmt border p-2 rounded-lg text-[10px]">
                                <select class="prodPayment border p-2 rounded-lg text-[10px]">
                                    <option value="已付">已付</option><option value="到付">到付</option><option value="待付">待付</option>
                                </select>
                            </div>
                            <div class="pre-dates hidden grid grid-cols-2 gap-2 mt-2">
                                <input type="date" class="pStart border p-1 rounded text-[9px]" title="預購日期">
                                <input type="date" class="pEnd border p-1 rounded text-[9px]" title="取貨日期">
                            </div>
                            <div class="cmx-area hidden mt-2">
                                <input type="text" class="cmxNum w-full border p-2 rounded-lg text-[10px] font-bold text-blue-600" placeholder="輸入 CM 賣貨便編號">
                            </div>
                        </div>
                    </div>
                    <button id="submitBtn" onclick="submitOrder()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black">確認儲存並提交</button>
                </div>
            </div>
        </section>

        <div id="cardContainer" class="grid gap-6"></div>
        <div id="profitContainer" class="hidden bg-white p-6 rounded-3xl shadow-md border border-gray-100">
            <h2 class="text-xl font-black mb-6">💰 財務利潤報告</h2>
            <div id="profitTableBody" class="space-y-2"></div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5vPRE71thYhYY-4XDMZ2oByLBsaZmy_FQPHzjHvAthhCTFmUCC29SycppE4d7pJ4mWA/exec";
        let allData = [];
        let currentMode = 'active';

        window.onload = loadOrders;

        async function loadOrders() {
            const container = document.getElementById('cardContainer');
            if (currentMode !== 'profit') container.innerHTML = "<div class='text-center py-20 text-gray-400 font-bold'>🔄 同步數據中...</div>";
            const res = await fetch(GAS_URL);
            allData = await res.json();
            updateSummaryUI();
            if (currentMode === 'profit') renderProfit(); else renderOrders();
        }

        function handleLocChange(el) {
            const row = el.closest('.item-row');
            row.querySelector('.pre-dates').classList.toggle('hidden', el.value !== '7仔預購');
            row.querySelector('.cmx-area').classList.toggle('hidden', el.value !== '賣貨便');
        }

        function updateSummaryUI() {
            const box = document.getElementById('summary-container');
            const s = { "蝦皮":0, "7-11":0, "全家":0, "宅配":0, "7仔預購":0, "賣貨便":0 };
            allData.forEach(i => { 
                if(!i.fullAddress.includes("運單:") && (i.status==='待取貨'||i.status==='待預購'||i.status==='已寄出')) {
                    if(s[i.location]!==undefined) s[i.location]++;
                }
            });
            box.innerHTML = Object.keys(s).map(l => `<div onclick="filterStatDetail('${l}')" class="stat-card p-4 rounded-3xl text-center"><p class="text-[10px] opacity-40 uppercase font-black">${l}</p><p class="text-2xl font-black mt-1">${s[l]}</p></div>`).join('');
        }

        function renderOrders() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";

            // 1. 分組
            const groups = allData.reduce((acc, obj) => {
                const oid = obj.orderID;
                if (!acc[oid]) acc[oid] = [];
                acc[oid].push(obj);
                return acc;
            }, {});

            // 2. 判定進行中與歷史單
            const activeOrders = [];
            const historyOrders = [];

            Object.keys(groups).forEach(oid => {
                const items = groups[oid];
                // 只要這張單裡面有任何一項沒填"運單:"，就是進行中
                const isFinished = items.every(i => i.fullAddress.includes("運單:"));
                if (isFinished) historyOrders.push(items); else activeOrders.push(items);
            });

            // 3. 排序：歷史單最新完成（rowNum最大）排最前
            historyOrders.sort((a,b) => b[0].rowNum - a[0].rowNum);
            activeOrders.sort((a,b) => b[0].rowNum - a[0].rowNum);

            const displayList = currentMode === 'active' ? activeOrders : historyOrders;

            displayList.forEach(items => {
                const first = items[0];
                const isReady = items.every(i => i.status === '待取貨' || i.status === '已寄出');
                const card = document.createElement('div');
                card.className = `bg-white rounded-3xl shadow-md border border-gray-100 overflow-hidden mb-4 ${ (isReady && currentMode==='active') ? 'card-ready-to-ship' : ''}`;
                
                card.innerHTML = `
                    <div class="p-4 bg-gray-50 flex justify-between items-center">
                        <div>
                            <span class="text-[10px] font-black bg-blue-100 text-blue-700 px-2 py-0.5 rounded mr-2">${first.orderID}</span>
                            <b class="text-lg">${first.name}</b>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="reuseCustomer('${first.name}')" class="bg-green-600 text-white text-[10px] px-3 py-1.5 rounded-xl font-bold">+ 加單</button>
                            <button onclick="enableEdit('${first.orderID}')" id="editBtn-${first.orderID}" class="bg-gray-800 text-white text-[10px] px-3 py-1.5 rounded-xl font-bold">📝 修改資料</button>
                        </div>
                    </div>
                    <div class="p-4 space-y-3">
                        <div id="info-${first.orderID}" class="text-[11px] font-bold text-gray-500 space-y-1">
                            <p>收件人: <span id="view-rcv-${first.orderID}">${first.receiver}</span></p>
                            <p>電話: <span id="view-phn-${first.orderID}">${first.phone}</span></p>
                            <p>地址: <span id="view-adr-${first.orderID}">${first.fullAddress}</span></p>
                        </div>
                        <div id="edit-area-${first.orderID}" class="hidden space-y-2 bg-blue-50 p-3 rounded-xl">
                            <input type="text" id="edit-rcv-${first.orderID}" value="${first.receiver}" class="w-full p-2 text-xs rounded border" placeholder="收件人">
                            <input type="text" id="edit-phn-${first.orderID}" value="${first.phone}" class="w-full p-2 text-xs rounded border" placeholder="電話">
                            <textarea id="edit-adr-${first.orderID}" class="w-full p-2 text-xs rounded border h-16" placeholder="地址">${first.fullAddress}</textarea>
                            <button onclick="saveCustomerInfo('${first.orderID}')" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">儲存修改</button>
                        </div>

                        <div class="space-y-2 border-t pt-3">
                            ${items.map(si => `
                                <div class="flex justify-between items-center bg-white p-2 rounded-xl border shadow-sm">
                                    <div class="text-xs">
                                        <p class="font-black">${si.product}</p>
                                        <p class="text-[9px] text-gray-400">${si.location} | $${si.amount} | ${si.payment}</p>
                                    </div>
                                    <span class="badge badge-${si.status}">${si.status}</span>
                                </div>
                            `).join('')}
                        </div>
                        ${(currentMode === 'active' && isReady) ? `
                            <div class="mt-3 flex gap-2">
                                <input type="text" id="track-${first.orderID}" placeholder="順豐單號" class="flex-1 text-xs p-2 rounded-xl border">
                                <button onclick="shipOrder('${first.orderID}', '${first.name}')" class="bg-red-500 text-white text-xs px-4 py-2 rounded-xl font-black">確認寄出</button>
                            </div>
                        ` : ''}
                    </div>`;
                container.appendChild(card);
            });
        }

        function enableEdit(oid) {
            document.getElementById(`info-${oid}`).classList.add('hidden');
            document.getElementById(`edit-area-${oid}`).classList.remove('hidden');
            document.getElementById(`editBtn-${oid}`).classList.add('hidden');
        }

        async function saveCustomerInfo(oid) {
            const rcv = document.getElementById(`edit-rcv-${oid}`).value;
            const phn = document.getElementById(`edit-phn-${oid}`).value;
            const adr = document.getElementById(`edit-adr-${oid}`).value;
            
            // 找出該 OrderID 的所有行號並更新
            const relatedItems = allData.filter(i => i.orderID === oid);
            for (let item of relatedItems) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateCustomer", rowNum: item.rowNum, receiver: rcv, phone: phn, fullAddress: adr }), mode: 'no-cors' });
            }
            alert("修改成功！");
            loadOrders();
        }

        async function shipOrder(oid, name) {
            const track = document.getElementById(`track-${oid}`).value;
            if(!track) return alert("請輸入單號");
            const relatedItems = allData.filter(i => i.orderID === oid);
            for (let item of relatedItems) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateField", rowNum: item.rowNum, field: 'status', value: '已取貨', tracking: track }), mode: 'no-cors' });
            }
            const msg = `你好 ${name}，你購買的訂單已經寄出囉！\n順豐單號：${track}\n謝謝🙏🏻🙏🏻`;
            await navigator.clipboard.writeText(msg);
            document.getElementById('modalCopyText').value = msg;
            document.getElementById('copyModal').style.display = 'flex';
        }

        function reuseCustomer(name) {
            const data = allData.find(i => i.name === name);
            if(data) {
                document.getElementById('custName').value = data.name;
                document.getElementById('source').value = data.source;
                document.getElementById('receiver').value = data.receiver;
                document.getElementById('phone').value = data.phone;
                document.getElementById('fullAddress').value = data.fullAddress.split(' (運單:')[0];
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        async function submitOrder() {
            const d = new Date();
            const payload = {
                orderID: "TW"+d.getTime().toString().slice(-4),
                customerName: document.getElementById('custName').value,
                source: document.getElementById('source').value,
                receiver: document.getElementById('receiver').value,
                phone: document.getElementById('phone').value,
                fullAddress: document.getElementById('fullAddress').value,
                orderDate: `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`,
                items: Array.from(document.querySelectorAll('.item-row')).map(row => {
                    const loc = row.querySelector('.prodLoc').value;
                    return {
                        productName: row.querySelector('.prodName').value,
                        pickupLocation: loc,
                        amount: row.querySelector('.prodAmt').value,
                        paymentStatus: row.querySelector('.prodPayment').value,
                        status: loc === '7仔預購' ? '待預購' : '待取貨',
                        date: loc === '7仔預購' ? `(預:${row.querySelector('.pStart').value} 攞:${row.querySelector('.pEnd').value})` : "",
                        cmxNumber: loc === '賣貨便' ? row.querySelector('.cmxNum').value : ""
                    };
                })
            };
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
            location.reload();
        }

        function switchView(mode) {
            currentMode = mode;
            document.getElementById('add-section').style.display = (mode === 'active') ? "block" : "none";
            document.getElementById('nav-active').className = (mode === 'active') ? "px-4 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500";
            document.getElementById('nav-history').className = (mode === 'history') ? "px-4 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500";
            loadOrders();
        }
        function copyAndClose() { document.getElementById('copyModal').style.display = 'none'; loadOrders(); }
        function addItemRow() { const row = document.querySelector('.item-row').cloneNode(true); row.querySelectorAll('input').forEach(i => i.value = ''); document.getElementById('itemsContainer').appendChild(row); }
    </script>
</body>
</html>
