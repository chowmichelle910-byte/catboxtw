<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 禁止 iPhone 雙擊或雙指手勢放大縮小頁面 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🇹🇼 台灣-訂單管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: 900; }
        .badge-待預購 { background: #EC4899; }
        .badge-待取貨 { background: #F59E0B; }
        .badge-已取貨 { background: #10B981; }
        .badge-已寄出 { background: #9CA3AF; }
        .source-IG { background-color: #E1306C; }
        .source-WhatsApp { background-color: #22C55E; }
        .source-Threads { background-color: #000000; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; }
        .card-ready-to-ship { border: 4px solid #EF4444 !important; background-color: #FFF1F2 !important; }
        #copyModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20 font-sans text-gray-900">

    <!-- 系統通知與自動複製文字的彈窗 -->
    <div id="copyModal">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-lg font-black mb-2 flex items-center gap-2 text-green-600">✨ 已自動複製回覆句子</h3>
            <p class="text-xs text-gray-500 mb-4">您可以直接去貼給客人囉！若沒複製成功，可手動點擊下方文字框全選複製：</p>
            <textarea id="modalCopyText" class="w-full h-32 p-4 border rounded-2xl text-[12px] bg-gray-50 mb-4 outline-none" readonly></textarea>
            <button onclick="document.getElementById('copyModal').style.display='none'" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">確認關閉</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 space-y-6">
        <div class="flex flex-col md:flex-row items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🇹🇼</span>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">台灣-訂單管理</h1>
            </div>
            <nav class="flex bg-gray-100 p-1 rounded-xl">
                <button onclick="switchView('active')" id="nav-active" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600">進行中</button>
                <button onclick="switchView('history')" id="nav-history" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">歷史訂單</button>
                <button onclick="switchView('profit')" id="nav-profit" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">💰 利潤統計</button>
            </nav>
        </div>

        <div id="active-ui-group">
            <section id="stat-section" class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white mb-6">
                <div id="summary-container" class="grid grid-cols-3 md:grid-cols-6 gap-3"></div>
                <div id="filter-details" class="hidden mt-6 pt-6 border-t border-white/10">
                    <div class="flex justify-between items-center mb-2">
                        <h3 id="filter-title" class="text-sm font-bold text-blue-400 italic"></h3>
                        <button onclick="document.getElementById('filter-details').classList.add('hidden')" class="text-[10px] bg-white/20 px-3 py-1 rounded-lg">關閉 ✕</button>
                    </div>
                    <!-- 賣貨便可取貨金額動態顯示區 -->
                    <div id="sf-ready-amount-box" class="hidden mb-4 p-3 bg-blue-900/50 border border-blue-500/30 rounded-xl text-xs text-blue-300 font-bold"></div>
                    <div id="filter-items-list" class="space-y-2 max-h-80 overflow-y-auto pr-2"></div>
                </div>
            </section>

            <section id="add-section" class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-4">
                        <p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">客戶資訊</p>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="custName" placeholder="客戶名稱" class="border-b p-2 outline-none text-sm font-bold">
                            <select id="source" class="border-b p-2 outline-none text-sm font-bold">
                                <option value="IG">IG</option><option value="WhatsApp">WhatsApp</option><option value="Threads">Threads</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="text" id="receiver" placeholder="收件人姓名" class="border-b p-2 outline-none text-sm font-bold">
                            <input type="text" id="phone" placeholder="電話號碼" class="border-b p-2 outline-none text-sm font-bold">
                        </div>
                        <textarea id="fullAddress" placeholder="輸入地址..." class="w-full border p-3 rounded-2xl h-20 text-xs bg-gray-50 outline-none"></textarea>
                        
                        <!-- 順豐點碼搜尋功能 -->
                        <div class="bg-gray-50 p-3 rounded-2xl border border-gray-200 mt-2">
                            <p class="font-bold text-gray-500 text-[10px] uppercase tracking-widest mb-2">📦 順豐點碼搜尋</p>
                            <div class="flex gap-2">
                                <input type="text" id="sfCodeInput" placeholder="例如: 852TAM" class="flex-1 text-xs p-2 rounded-xl border outline-none font-mono uppercase">
                                <button type="button" onclick="searchSFCode()" class="bg-slate-800 text-white text-xs px-4 py-2 rounded-xl font-bold">搜尋</button>
                            </div>
                            <p id="sfStatusText" class="text-[10px] text-gray-400 mt-1 hidden"></p>
                        </div>
                    </div>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">商品明細</p>
                            <button onclick="addItemRow()" class="text-blue-600 text-[10px] font-black underline">+ 增加品項</button>
                        </div>
                        <div id="itemsContainer" class="space-y-3">
                            <div class="item-row bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                <input type="text" placeholder="商品名稱" class="prodName w-full mb-2 p-2 rounded-lg border text-sm">
                                <div class="grid grid-cols-3 gap-2 mb-2">
                                    <select class="prodLoc border p-2 rounded-lg text-[10px]" onchange="toggleDynamicFields(this)">
                                        <option value="蝦皮">蝦皮</option>
                                        <option value="7-11">7-11</option>
                                        <option value="全家">全家</option>
                                        <option value="宅配">宅配</option>
                                        <option value="7仔預購">7仔預購</option>
                                        <option value="賣貨便">賣貨便</option>
                                    </select>
                                    <input type="number" placeholder="金額" class="prodAmt border p-2 rounded-lg text-[10px]">
                                    <select class="prodPayment border p-2 rounded-lg text-[10px]">
                                        <option value="已付">已付</option><option value="到付">到付</option><option value="待付">待付</option>
                                    </select>
                                </div>
                                <div class="dynamic-field-container"></div>
                            </div>
                        </div>
                        <button onclick="submitOrder()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">確認儲存並提交</button>
                    </div>
                </div>
            </section>
        </div>

        <div id="cardContainer" class="grid gap-6"></div>

        <div id="profitContainer" class="hidden bg-slate-900 p-8 rounded-[40px] shadow-2xl text-white">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <span class="bg-blue-600 p-2 rounded-xl text-xl">💰</span> 每月利潤分析
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-3">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-widest">
                            <th class="px-4 pb-2">月份</th>
                            <th class="px-4 pb-2">台幣總額 (TWD)</th>
                            <th class="px-4 pb-2 w-32">設定匯率</th>
                            <th class="px-4 pb-2 text-right">計算港幣 (HKD)</th>
                        </tr>
                    </thead>
                    <tbody id="profitTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5vPRE71thYhYY-4XDMZ2oByLBsaZmy_FQPHzjHvAthhCTFmUCC29SycppE4d7pJ4mWA/exec";
        let allData = [];
        let currentMode = 'active';

        window.onload = loadData;

        async function loadData() {
            const container = document.getElementById('cardContainer');
            if (currentMode !== 'profit') container.innerHTML = "<div class='text-center py-20 text-gray-400 font-bold'>🔄 資料讀取中...</div>";
            
            const res = await fetch(GAS_URL);
            allData = await res.json();
            
            updateSummaryUI();
            if (currentMode === 'profit') renderProfit(); else renderOrders();
        }

        async function searchSFCode() {
            const codeInput = document.getElementById('sfCodeInput');
            const statusText = document.getElementById('sfStatusText');
            const code = codeInput.value.trim();
            if (!code) return alert("請輸入順豐點碼！");
            
            statusText.classList.remove('hidden');
            statusText.className = "text-[10px] text-blue-500 mt-1";
            statusText.innerText = "🔍 搜尋中...";
            
            try {
                const response = await fetch(`${GAS_URL}?action=searchSF&code=${encodeURIComponent(code)}`);
                const result = await response.json();
                if (result.found) {
                    document.getElementById('fullAddress').value = result.address;
                    statusText.className = "text-[10px] text-green-600 mt-1";
                    statusText.innerText = "✅ 已成功找到並為您填入地址！";
                } else {
                    statusText.className = "text-[10px] text-red-500 mt-1";
                    statusText.innerText = "❌ 找不到該順豐點碼。";
                }
            } catch (error) {
                statusText.className = "text-[10px] text-red-500 mt-1";
                statusText.innerText = "⚠️ 搜尋失敗。";
            }
        }

        function toggleDynamicFields(selectEl) {
            const row = selectEl.closest('.item-row');
            const container = row.querySelector('.dynamic-field-container');
            const val = selectEl.value;
            container.innerHTML = "";
            
            if (val === "賣貨便") {
                container.innerHTML = `<div class="mt-2"><input type="text" placeholder="請輸入賣貨便訂單號碼" class="cmxNumber w-full p-2 rounded-lg border text-xs font-mono bg-blue-50 border-blue-200 outline-none"></div>`;
            } else if (val === "7仔預購") {
                container.innerHTML = `<div class="mt-2 flex items-center gap-2"><span class="text-[10px] text-pink-600 font-bold shrink-0">取貨日期:</span><input type="date" class="pickupDate w-full p-2 rounded-lg border text-xs bg-pink-50 border-pink-200 outline-none"></div>`;
            }
        }

        function switchView(mode) {
            currentMode = mode;
            document.getElementById('active-ui-group').style.display = (mode === 'active') ? "block" : "none";
            document.getElementById('profitContainer').classList.toggle('hidden', mode !== 'profit');
            document.getElementById('cardContainer').classList.toggle('hidden', mode === 'profit');
            
            ['active', 'history', 'profit'].forEach(b => {
                const el = document.getElementById(`nav-${b}`);
                el.className = b === mode ? "px-4 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500";
            });
            loadData();
        }

        async function editCustomerDetails(name, currentRcv, currentPhone, currentAddr) {
            const newRcv = prompt("請輸入新的 收件人姓名:", currentRcv);
            if (newRcv === null) return;
            const newPhone = prompt("請輸入新的 電話號碼:", currentPhone);
            if (newPhone === null) return;
            const newAddr = prompt("請輸入新的 詳細地址:", currentAddr.split(' (運單:')[0]);
            if (newAddr === null) return;

            const targets = allData.filter(i => i.name === name && !i.fullAddress.includes("運單:"));
            if(targets.length === 0) return alert("進行中的訂單方可修改地址欄。");

            for(let item of targets) {
                await fetch(GAS_URL, {
                    method: 'POST',
                    body: JSON.stringify({
                        action: "updateCustomer",
                        rowNum: item.rowNum,
                        receiver: newRcv,
                        phone: newPhone,
                        fullAddress: newAddr
                    }),
                    mode: 'no-cors'
                });
            }
            alert("✅ 地址資訊修改成功！");
            loadData();
        }

        function reuseCustomer(name) {
            const data = allData.find(i => i.name === name);
            if(data) {
                document.getElementById('custName').value = data.name;
                document.getElementById('source').value = data.source;
                document.getElementById('receiver').value = data.receiver;
                document.getElementById('phone').value = data.phone;
                document.getElementById('fullAddress').value = data.fullAddress.split(' (運單:')[0];
                
                switchView('active');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function triggerAutoCopyReply(name, trackCode) {
            const replyMsg = `Hi ${name}～\n您的貨品已經安排順豐寄出囉！\n🚚 順豐單號：${trackCode}\n感謝您的購買 ✨`;
            
            navigator.clipboard.writeText(replyMsg).then(() => {
                document.getElementById('modalCopyText').value = replyMsg;
                document.getElementById('copyModal').style.display = 'flex';
            }).catch(err => {
                document.getElementById('modalCopyText').value = replyMsg;
                document.getElementById('copyModal').style.display = 'flex';
            });
        }

        function renderOrders() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";
            const nameGroups = allData.reduce((acc, obj) => {
                if (!acc[obj.name]) acc[obj.name] = [];
                acc[obj.name].push(obj);
                return acc;
            }, {});

            let activeGroups = [];
            let historyGroups = [];

            Object.keys(nameGroups).forEach(name => {
                const items = nameGroups[name];
                const hasActiveItem = items.some(i => i.status !== '已寄出' && !i.fullAddress.includes("運單:"));
                if (hasActiveItem) activeGroups.push(items); else historyGroups.push(items);
            });

            if (currentMode === 'active') {
                activeGroups.sort((a, b) => {
                    const aReady = a.every(i => i.status === '已取貨' || i.status === '已寄出');
                    const bReady = b.every(i => i.status === '已取貨' || i.status === '已寄出');
                    if (aReady !== bReady) return aReady ? -1 : 1;
                    return b[0].rowNum - a[0].rowNum;
                });
                renderCardList(activeGroups);
            } else {
                historyGroups.sort((a, b) => {
                    const dateA = new Date(a[0].shipDate || "1970/01/01");
                    const dateB = new Date(b[0].shipDate || "1970/01/01");
                    return dateB - dateA;
                });
                renderCardList(historyGroups);
            }
        }

        function renderCardList(list) {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";

            list.forEach(items => {
                const first = items[0];
                const allPicked = items.every(i => i.status === '已取貨' || i.status === '已寄出');
                const isFinished = first.fullAddress.includes("運單:");
                const displayItems = (currentMode === 'active') ? items.filter(si => si.status !== '已寄出') : items;

                if (displayItems.length === 0 && currentMode === 'active') return;

                const card = document.createElement('div');
                card.className = `bg-white rounded-3xl shadow-sm border overflow-hidden mb-4 ${ (allPicked && !isFinished) ? 'card-ready-to-ship' : 'border-gray-100'}`;
                
                card.innerHTML = `
                    <div class="p-4 bg-gray-50 flex justify-between items-center border-b">
                        <div class="flex items-center">
                            <span class="badge source-${first.source} mr-2 uppercase">${first.source}</span>
                            <b class="text-base font-black">${first.name}</b>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="reuseCustomer('${first.name}')" class="bg-green-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold">+ 加單</button>
                            ${!isFinished ? `<button onclick="editCustomerDetails('${first.name}','${first.receiver}','${first.phone}','${first.fullAddress}')" class="bg-amber-500 text-white text-[10px] px-2 py-1 rounded-lg font-bold">✍️ 修改</button>` : ''}
                            <button onclick="copyAddr('${first.receiver}','${first.phone}','${first.fullAddress}')" class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold">📋 地址</button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="text-[11px] text-gray-500 mb-4 bg-gray-100/50 p-2 rounded-xl">
                            <p>收件: ${first.receiver} | ${first.phone}</p>
                            <p class="truncate">地址: ${first.fullAddress}</p>
                            ${first.shipDate ? `<p class="text-gray-400 text-[10px] mt-1">📦 完成日期: ${first.shipDate}</p>` : ''}
                        </div>
                        <div class="space-y-3">
                            ${displayItems.map(si => {
                                let extraInfo = "";
                                if (si.location === "賣貨便" && si.date) extraInfo = ` | 編號: ${si.date}`;
                                return `
                                <div class="flex justify-between items-center bg-gray-50 p-2 rounded-lg">
                                    <div class="flex-1">
                                        <p class="text-xs font-black">${si.product}</p>
                                        <p class="text-[9px] text-gray-400">${si.location} ${extraInfo} | $${si.amount}</p>
                                    </div>
                                    <select onchange="updateItemStatus(${si.rowNum}, this.value)" class="badge badge-${si.status} border-none outline-none appearance-none cursor-pointer">
                                        <option value="待預購" ${si.status==='待預購'?'selected':''}>待預購</option>
                                        <option value="待取貨" ${si.status==='待取貨'?'selected':''}>待取貨</option>
                                        <option value="已取貨" ${si.status==='已取貨'?'selected':''}>已取貨</option>
                                        <option value="已寄出" ${si.status==='已寄出'?'selected':''}>已寄出</option>
                                    </select>
                                </div>
                            `}).join('')}
                        </div>
                        ${(!isFinished && allPicked) ? `
                            <div class="mt-6 pt-4 border-t-2 border-dashed border-red-200">
                                <div class="flex gap-2">
                                    <input type="text" id="track-${first.name}" placeholder="輸入順豐單號結單" class="flex-1 text-xs p-3 rounded-xl border-2 border-red-200 outline-none focus:border-red-500">
                                    <button onclick="shipAllByName('${first.name}')" class="bg-red-500 text-white text-xs px-6 py-2 rounded-xl font-black shadow-md">全部寄出</button>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function updateItemStatus(rowNum, newVal) {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateField", rowNum: rowNum, field: 'status', value: newVal }), mode: 'no-cors' });
            loadData();
        }

        async function shipAllByName(name) {
            const track = document.getElementById(`track-${name}`).value.trim();
            if(!track) return alert("請輸入單號");
            
            const related = allData.filter(i => i.name === name && !i.fullAddress.includes("運單:"));
            for (let item of related) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateField", rowNum: item.rowNum, field: 'status', value: '已寄出', tracking: track }), mode: 'no-cors' });
            }
            
            triggerAutoCopyReply(name, track);
            loadData();
        }

        function addItemRow() {
            const container = document.getElementById('itemsContainer');
            const row = container.children[0].cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            row.querySelector('.dynamic-field-container').innerHTML = '';
            container.appendChild(row);
        }

        async function submitOrder() {
            const d = new Date();
            const itemsData = Array.from(document.querySelectorAll('.item-row')).map(row => {
                const loc = row.querySelector('.prodLoc').value;
                let cmxNum = ""; let pickDate = "";
                if (loc === "賣貨便") {
                    const cmxInput = row.querySelector('.cmxNumber'); if (cmxInput) cmxNum = cmxInput.value.trim();
                } else if (loc === "7仔預購") {
                    const dateInput = row.querySelector('.pickupDate'); if (dateInput) pickDate = dateInput.value.replace(/-/g, '/');
                }
                return {
                    productName: row.querySelector('.prodName').value, pickupLocation: loc,
                    amount: row.querySelector('.prodAmt').value, paymentStatus: row.querySelector('.prodPayment').value,
                    status: '待取貨', cmxNumber: cmxNum, date: pickDate 
                };
            });

            const payload = {
                orderID: "TW"+d.getTime().toString().slice(-4), customerName: document.getElementById('custName').value,
                source: document.getElementById('source').value, receiver: document.getElementById('receiver').value,
                phone: document.getElementById('phone').value, fullAddress: document.getElementById('fullAddress').value,
                orderDate: `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`, items: itemsData
            };
            
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
            location.reload();
        }

        function updateSummaryUI() {
            const box = document.getElementById('summary-container');
            if (currentMode !== 'active') return; 
            const locs = ["蝦皮", "7-11", "全家", "宅配", "7仔預購", "賣貨便"];
            const stats = {}; locs.forEach(l => stats[l] = 0);
            allData.forEach(i => {
                if (!i.fullAddress.includes("運單:") && i.status === '待取貨') {
                    if(stats[i.location] !== undefined) stats[i.location]++;
                }
            });
            box.innerHTML = locs.map(l => `
                <div onclick="showFilterDetail('${l}')" class="stat-card p-4 rounded-2xl text-center">
                    <p class="text-[9px] opacity-50 font-black">${l}</p><p class="text-xl font-black mt-1">${stats[l]}</p>
                </div>
            `).join('');
        }

        // 需求優化：在各訂單商品名稱後顯示金額，並在賣貨便位置顯示可取貨的總計金額
        function showFilterDetail(loc) {
            const detailBox = document.getElementById('filter-details');
            const readyAmtBox = document.getElementById('sf-ready-amount-box');
            
            detailBox.classList.remove('hidden');
            document.getElementById('filter-title').innerText = `📍 ${loc} - 待取貨清單`;
            
            const filtered = allData.filter(i => i.location === loc && i.status === '待取貨' && !i.fullAddress.includes("運單:"));
            
            // 如果點擊的是賣貨便，統計 Q 欄 (arrivalDate) 已有到貨日期的總金額
            if (loc === "賣貨便") {
                const readyToPickItems = filtered.filter(i => i.arrivalDate && i.arrivalDate.trim() !== "");
                const totalReadyAmount = readyToPickItems.reduce((sum, item) => sum + parseFloat(item.amount || 0), 0);
                
                readyAmtBox.innerHTML = `📦 目前已到貨（可取貨）商品總金額：<span class="text-yellow-400 text-sm font-black">NT$ ${totalReadyAmount.toLocaleString()}</span>`;
                readyAmtBox.classList.remove('hidden');
            } else {
                readyAmtBox.classList.add('hidden');
            }

            // 渲染清單，在商品名稱後面追加顯示金額
            document.getElementById('filter-items-list').innerHTML = filtered.map(i => `
                <div class="bg-white/10 p-3 rounded-xl flex justify-between items-center text-[11px]">
                    <div>
                        <p class="font-bold text-white">${i.product} <span class="text-yellow-400 ml-1">($${parseFloat(i.amount || 0)})</span></p>
                        <p class="text-gray-400 text-[10px]">${i.name} ${i.arrivalDate ? `| 🏪 到貨日: ${i.arrivalDate}` : ''}</p>
                    </div>
                    <button onclick="updateItemStatus(${i.rowNum}, '已取貨')" class="bg-blue-500 px-3 py-1 rounded-lg font-bold">已取貨</button>
                </div>
            `).join('') || "暫無項目";
        }

        function renderProfit() {
            const tableBody = document.getElementById('profitTableBody');
            const monthlyStats = allData.reduce((acc, obj) => {
                const month = obj.orderDate.substring(0, 7); 
                if (month && month.length === 7) {
                    if (!acc[month]) acc[month] = { twdTotal: 0, rate: (obj.monthlyRate && obj.monthlyRate > 0) ? obj.monthlyRate : null };
                    acc[month].twdTotal += parseFloat(obj.amount || 0);
                }
                return acc;
            }, {});

            const sortedMonths = Object.keys(monthlyStats).sort().reverse();
            tableBody.innerHTML = sortedMonths.map(m => {
                const data = monthlyStats[m];
                let hkdDisplay = "";
                if (data.rate && data.rate > 0) {
                    const hkdProfit = (data.twdTotal / 3.6) - (data.twdTotal / data.rate);
                    hkdDisplay = `<span class="${hkdProfit >= 0 ? 'text-green-400' : 'text-red-400'}">HKD ${Math.round(hkdProfit).toLocaleString()}</span>`;
                } else {
                    hkdDisplay = `<span class="text-gray-600 italic text-[10px]">請先輸入匯率</span>`;
                }
                return `
                    <tr class="bg-white/5 border-b border-white/5 text-sm">
                        <td class="p-4 font-bold text-blue-400">${m}</td>
                        <td class="p-4 font-mono">$${data.twdTotal.toLocaleString()}</td>
                        <td class="p-4">
                            <input type="number" step="0.01" value="${data.rate || ''}" placeholder="輸入匯率" onchange="updateMonthlyRate('${m}', this.value)" class="bg-slate-800 text-white border border-white/10 rounded px-2 py-1 w-24 text-center outline-none">
                        </td>
                        <td class="p-4 text-right font-black">${hkdDisplay}</td>
                    </tr>
                `;
            }).join('') || "<tr><td colspan='4' class='text-center py-10 text-gray-500'>暫無財務數據</td></tr>";
        }

        async function updateMonthlyRate(month, newRate) {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateMonthlyRate", month: month, rate: newRate }), mode: 'no-cors' });
            loadData();
        }

        function copyAddr(rcv, phn, adr) {
            const text = `${rcv}\n${phn}\n${adr.split(' (運單:')[0]}`;
            navigator.clipboard.writeText(text);
            alert("地址已複製");
        }
    </script>
</body>
</html>
