<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🇹🇼 台灣-訂單管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; color: white; font-weight: 900; }
        .badge-待預購 { background: #EC4899; }
        .badge-待取貨 { background: #F59E0B; }
        .badge-已取貨 { background: #10B981; }
        .badge-已寄出 { background: #9CA3AF; }
        .stat-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); cursor: pointer; transition: all 0.2s; }
        .card-ready-to-ship { border: 3px solid #EF4444 !important; background-color: #FFF1F2 !important; }
        #copyModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen pb-20 font-sans text-gray-900">

    <div id="copyModal">
        <div class="bg-white p-6 rounded-3xl max-w-sm w-full mx-4 shadow-2xl">
            <h3 class="text-lg font-black mb-4">📢 系統訊息</h3>
            <textarea id="modalCopyText" class="w-full h-32 p-4 border rounded-2xl text-[12px] bg-gray-50 mb-4 outline-none" readonly></textarea>
            <button onclick="document.getElementById('copyModal').style.display='none'" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm">關閉</button>
        </div>
    </div>

    <div class="max-w-6xl mx-auto p-4 space-y-6">
        <div class="flex flex-col md:flex-row items-center justify-between bg-white p-5 rounded-2xl shadow-sm border border-gray-100 gap-4">
            <div class="flex items-center space-x-2">
                <span class="text-2xl">🇹🇼</span>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">台灣-訂單管理</h1>
            </div>
            <nav class="flex bg-gray-100 p-1 rounded-xl">
                <button onclick="switchView('active')" id="nav-active" class="px-4 py-2 rounded-lg text-xs font-bold transition-all bg-white shadow-sm text-blue-600">進行中</button>
                <button onclick="switchView('history')" id="nav-history" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">歷史訂單</button>
                <button onclick="switchView('profit')" id="nav-profit" class="px-4 py-2 rounded-lg text-xs font-bold transition-all text-gray-500">💰 利潤統計</button>
            </nav>
        </div>

        <section id="stat-section" class="bg-slate-900 p-6 rounded-3xl shadow-xl text-white">
            <div id="summary-container" class="grid grid-cols-3 md:grid-cols-6 gap-3"></div>
            <div id="filter-details" class="hidden mt-6 pt-6 border-t border-white/10">
                <h3 id="filter-title" class="text-sm font-bold text-blue-400 mb-4 italic"></h3>
                <div id="filter-items-list" class="space-y-2 max-h-80 overflow-y-auto pr-2"></div>
            </div>
        </section>

        <section id="add-section" class="bg-white p-6 rounded-3xl shadow-md border border-gray-100">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="space-y-4">
                    <p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">客戶資訊</p>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="custName" placeholder="客戶名稱" class="border-b p-2 outline-none text-sm font-bold">
                        <select id="source" class="border-b p-2 outline-none text-sm font-bold">
                            <option value="IG">IG</option><option value="WhatsApp">WhatsApp</option><option value="Threads">Threads</option>
                        </select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="receiver" placeholder="收件人姓名" class="border-b p-2 outline-none text-sm font-bold">
                        <input type="text" id="phone" placeholder="電話號碼" class="border-b p-2 outline-none text-sm font-bold">
                    </div>
                    <textarea id="fullAddress" placeholder="輸入地址..." class="w-full border p-3 rounded-2xl h-20 text-xs bg-gray-50 outline-none"></textarea>
                </div>
                <div class="space-y-4">
                    <div class="flex justify-between items-center"><p class="font-bold text-gray-400 text-[10px] uppercase tracking-widest">商品明細</p><button onclick="addItemRow()" class="text-blue-600 text-[10px] font-black underline">+ 增加品項</button></div>
                    <div id="itemsContainer" class="space-y-3">
                        <div class="item-row bg-gray-50 p-4 rounded-2xl border border-gray-100 relative">
                            <input type="text" placeholder="商品名稱" class="prodName w-full mb-2 p-2 rounded-lg border text-sm">
                            <div class="grid grid-cols-3 gap-2">
                                <select onchange="handleLocChange(this)" class="prodLoc border p-2 rounded-lg text-[10px]">
                                    <option value="蝦皮">蝦皮</option><option value="7-11">7-11</option><option value="全家">全家</option><option value="宅配">宅配</option><option value="7仔預購">7仔預購</option><option value="賣貨便">賣貨便</option>
                                </select>
                                <input type="number" placeholder="金額" class="prodAmt border p-2 rounded-lg text-[10px]">
                                <select class="prodPayment border p-2 rounded-lg text-[10px]">
                                    <option value="已付">已付</option><option value="到付">到付</option><option value="待付">待付</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <button id="submitBtn" onclick="submitOrder()" class="w-full mt-4 bg-blue-600 text-white py-4 rounded-2xl font-black shadow-lg">確認儲存並提交</button>
                </div>
            </div>
        </section>

        <div id="cardContainer" class="grid gap-6"></div>

        <div id="profitContainer" class="hidden bg-slate-900 p-8 rounded-[40px] shadow-2xl text-white">
            <h2 class="text-2xl font-black mb-8 flex items-center gap-3">
                <span class="bg-blue-600 p-2 rounded-xl text-xl">💰</span> 每月利潤分析
            </h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left border-separate border-spacing-y-3">
                    <thead>
                        <tr class="text-gray-400 text-[10px] uppercase tracking-widest">
                            <th class="px-4 pb-2">月份</th>
                            <th class="px-4 pb-2">台幣總額 (TWD)</th>
                            <th class="px-4 pb-2 w-32">設定匯率</th>
                            <th class="px-4 pb-2 text-right">計算港幣 (HKD)</th>
                        </tr>
                    </thead>
                    <tbody id="profitTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycby5vPRE71thYhYY-4XDMZ2oByLBsaZmy_FQPHzjHvAthhCTFmUCC29SycppE4d7pJ4mWA/exec";
        let allData = [];
        let currentMode = 'active';

        window.onload = loadData;

        async function loadData() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "<div class='text-center py-20 text-gray-400 font-bold animate-pulse'>🔄 資料同步中...</div>";
            const res = await fetch(GAS_URL);
            allData = await res.json();
            updateSummaryUI();
            if (currentMode === 'profit') renderProfit(); else renderOrders();
        }

        function updateSummaryUI() {
            const box = document.getElementById('summary-container');
            if (currentMode !== 'active') return; 
            
            const locs = ["蝦皮", "7-11", "全家", "宅配", "7仔預購", "賣貨便"];
            const stats = {};
            locs.forEach(l => stats[l] = 0);
            
            allData.forEach(i => {
                // 只計算「待取貨」且地址沒填單號的
                if (!i.fullAddress.includes("運單:") && i.status === '待取貨') {
                    if(stats[i.location] !== undefined) stats[i.location]++;
                }
            });

            box.innerHTML = locs.map(l => `
                <div onclick="showFilterDetail('${l}')" class="stat-card p-4 rounded-2xl text-center">
                    <p class="text-[9px] opacity-50 font-black">${l}</p>
                    <p class="text-xl font-black mt-1">${stats[l]}</p>
                </div>
            `).join('');
        }

        function showFilterDetail(loc) {
            const detailBox = document.getElementById('filter-details');
            const listContainer = document.getElementById('filter-items-list');
            const title = document.getElementById('filter-title');
            
            detailBox.classList.remove('hidden');
            title.innerText = `📍 ${loc} - 待取貨清單`;
            
            // 僅篩選「待取貨」商品
            const filtered = allData.filter(i => i.location === loc && i.status === '待取貨' && !i.fullAddress.includes("運單:"));

            listContainer.innerHTML = filtered.map(i => `
                <div class="bg-white/10 p-3 rounded-xl flex justify-between items-center text-[11px]">
                    <div class="flex-1">
                        <p class="font-bold text-white">${i.product}</p>
                        <p class="text-gray-400 text-[10px]">${i.name} | $${i.amount} (${i.payment})</p>
                    </div>
                    <div class="flex gap-2 items-center">
                        <span class="text-[10px] text-blue-400">${i.orderStatus || ""}</span>
                        <select onchange="updateQuickStatus(${i.rowNum}, this.value)" class="bg-slate-800 text-white border-none rounded p-1 text-[10px]">
                            <option value="待取貨" selected>待取貨</option>
                            <option value="已取貨">已取貨</option>
                        </select>
                    </div>
                </div>
            `).join('') || "<p class='text-gray-500 text-xs'>暫無待取貨項目</p>";
        }

        async function updateQuickStatus(rowNum, newVal) {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateField", rowNum: rowNum, field: 'status', value: newVal }), mode: 'no-cors' });
            loadData();
        }

        function renderOrders() {
            const container = document.getElementById('cardContainer');
            container.innerHTML = "";
            
            const groups = allData.reduce((acc, obj) => {
                if (!acc[obj.orderID]) acc[obj.orderID] = [];
                acc[obj.orderID].push(obj);
                return acc;
            }, {});

            let activeOrders = [];
            let historyOrders = [];

            Object.keys(groups).forEach(oid => {
                const items = groups[oid];
                const isFinished = items.every(i => i.fullAddress.includes("運單:"));
                if (isFinished) historyOrders.push(items); else activeOrders.push(items);
            });

            if (currentMode === 'active') {
                // 進行中排序：已到齊(紅框)置頂，其餘按 rowNum (時間)
                activeOrders.sort((a, b) => {
                    const aReady = a.every(i => i.status === '已取貨' || i.status === '已寄出');
                    const bReady = b.every(i => i.status === '已取貨' || i.status === '已寄出');
                    if (aReady && !bReady) return -1;
                    if (!aReady && bReady) return 1;
                    return b[0].rowNum - a[0].rowNum;
                });
                renderCardList(activeOrders);
            } else {
                // 歷史單：按「寄出日期 (O 欄)」由新到舊
                historyOrders.sort((a, b) => {
                    const dateA = new Date(a[0].shipDate || 0);
                    const dateB = new Date(b[0].shipDate || 0);
                    return dateB - dateA;
                });
                renderCardList(historyOrders);
            }
        }

        function renderCardList(list) {
            const container = document.getElementById('cardContainer');
            list.forEach(items => {
                const first = items[0];
                const allPicked = items.every(i => i.status === '已取貨' || i.status === '已寄出');
                const isFinished = first.fullAddress.includes("運單:");

                const card = document.createElement('div');
                card.className = `bg-white rounded-3xl shadow-sm border overflow-hidden mb-4 ${ (allPicked && !isFinished) ? 'card-ready-to-ship' : 'border-gray-100'}`;
                
                card.innerHTML = `
                    <div class="p-4 bg-gray-50 flex justify-between items-center border-b">
                        <div>
                            <span class="text-[10px] font-black bg-blue-100 text-blue-700 px-2 py-0.5 rounded mr-2">${first.orderID}</span>
                            <b class="text-sm">${first.name}</b>
                        </div>
                        <div class="flex gap-1">
                            <button onclick="copyAddr('${first.receiver}','${first.phone}','${first.fullAddress}')" class="bg-blue-600 text-white text-[10px] px-2 py-1 rounded-lg font-bold">📋 複製地址</button>
                            <button onclick="enableEdit('${first.orderID}')" class="bg-gray-800 text-white text-[10px] px-2 py-1 rounded-lg font-bold">📝 修改</button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div id="info-${first.orderID}" class="text-[11px] text-gray-500 mb-3 font-bold">
                            <p>收件人: ${first.receiver} | 電話: ${first.phone}</p>
                            <p class="truncate">地址: ${first.fullAddress}</p>
                        </div>
                        <div id="edit-area-${first.orderID}" class="hidden space-y-2 bg-blue-50 p-3 rounded-xl mb-3">
                            <input type="text" id="edit-rcv-${first.orderID}" value="${first.receiver}" class="w-full p-2 text-xs rounded border">
                            <input type="text" id="edit-phn-${first.orderID}" value="${first.phone}" class="w-full p-2 text-xs rounded border">
                            <textarea id="edit-adr-${first.orderID}" class="w-full p-2 text-xs rounded border h-16">${first.fullAddress}</textarea>
                            <button onclick="saveCustomerInfo('${first.orderID}')" class="w-full bg-blue-600 text-white py-2 rounded-lg text-xs font-bold">儲存</button>
                        </div>
                        <div class="space-y-2 border-t pt-3">
                            ${items.map(si => `
                                <div class="flex justify-between items-center text-[11px]">
                                    <div><p class="font-black">${si.product}</p><p class="text-[9px] text-gray-400">${si.location} | $${si.amount}</p></div>
                                    <span class="badge badge-${si.status}">${si.status}</span>
                                </div>
                            `).join('')}
                        </div>
                        ${(!isFinished && allPicked) ? `
                            <div class="mt-4 flex gap-2">
                                <input type="text" id="track-${first.orderID}" placeholder="順豐單號" class="flex-1 text-xs p-2 rounded-xl border border-red-300">
                                <button onclick="shipOrder('${first.orderID}', '${first.name}')" class="bg-red-500 text-white text-xs px-4 py-2 rounded-xl font-black">寄出</button>
                            </div>
                        ` : ''}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        async function copyAddr(rcv, phn, adr) {
            const cleanAdr = adr.split(' (運單:')[0];
            const text = `${rcv}\n${phn}\n${cleanAdr}`;
            await navigator.clipboard.writeText(text);
            alert("地址已複製：\n" + text);
        }

        function renderProfit() {
            const container = document.getElementById('profitContainer');
            const table = document.getElementById('profitTableBody');
            
            const monthlyData = allData.reduce((acc, obj) => {
                const m = obj.orderDate.substring(0, 7);
                if (!acc[m]) acc[m] = { total: 0, rate: obj.monthlyRate || 4.1 };
                acc[m].total += parseFloat(obj.amount || 0);
                return acc;
            }, {});

            table.innerHTML = Object.keys(monthlyData).sort().reverse().map(m => {
                const d = monthlyData[m];
                const hkd = (d.total / d.rate) - (d.total / 3.6);
                return `
                    <tr class="bg-white/5 border-b border-white/5 text-sm">
                        <td class="p-4 font-bold text-blue-400">${m}</td>
                        <td class="p-4">$${d.total.toLocaleString()}</td>
                        <td class="p-4">
                            <input type="number" step="0.01" value="${d.rate}" 
                                onchange="updateMonthlyRate('${m}', this.value)"
                                class="bg-slate-800 text-white border border-white/10 rounded px-2 py-1 w-20 text-center">
                        </td>
                        <td class="p-4 text-right font-black ${hkd >= 0 ? 'text-green-400' : 'text-red-400'}">
                            HKD ${Math.round(hkd).toLocaleString()}
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function updateMonthlyRate(month, newRate) {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateMonthlyRate", month: month, rate: newRate }), mode: 'no-cors' });
            loadData();
        }

        function switchView(mode) {
            currentMode = mode;
            document.getElementById('stat-section').style.display = (mode === 'active') ? "block" : "none";
            document.getElementById('add-section').style.display = (mode === 'active') ? "block" : "none";
            document.getElementById('profitContainer').classList.toggle('hidden', mode !== 'profit');
            document.getElementById('cardContainer').classList.toggle('hidden', mode === 'profit');
            
            document.getElementById('nav-active').className = (mode === 'active') ? "px-4 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500";
            document.getElementById('nav-history').className = (mode === 'history') ? "px-4 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500";
            document.getElementById('nav-profit').className = (mode === 'profit') ? "px-4 py-2 rounded-lg text-xs font-bold bg-white shadow-sm text-blue-600" : "px-4 py-2 rounded-lg text-xs font-bold text-gray-500";
            
            loadData();
        }

        // --- 其餘輔助函數 (維持不變) ---
        function enableEdit(oid) {
            document.getElementById(`info-${oid}`).classList.toggle('hidden');
            document.getElementById(`edit-area-${oid}`).classList.toggle('hidden');
        }

        async function saveCustomerInfo(oid) {
            const rcv = document.getElementById(`edit-rcv-${oid}`).value;
            const phn = document.getElementById(`edit-phn-${oid}`).value;
            const adr = document.getElementById(`edit-adr-${oid}`).value;
            const related = allData.filter(i => i.orderID === oid);
            for (let item of related) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateCustomer", rowNum: item.rowNum, receiver: rcv, phone: phn, fullAddress: adr }), mode: 'no-cors' });
            }
            loadData();
        }

        async function shipOrder(oid, name) {
            const track = document.getElementById(`track-${oid}`).value;
            if(!track) return alert("請輸入單號");
            const related = allData.filter(i => i.orderID === oid);
            for (let item of related) {
                await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: "updateField", rowNum: item.rowNum, field: 'status', value: '已寄出', tracking: track }), mode: 'no-cors' });
            }
            const msg = `你好 ${name}，你購買的訂單已經寄出囉！\n順豐單號：${track}\n謝謝🙏🏻`;
            await navigator.clipboard.writeText(msg);
            document.getElementById('modalCopyText').value = msg;
            document.getElementById('copyModal').style.display = 'flex';
        }

        function addItemRow() {
            const container = document.getElementById('itemsContainer');
            const row = container.children[0].cloneNode(true);
            row.querySelectorAll('input').forEach(i => i.value = '');
            container.appendChild(row);
        }

        async function submitOrder() {
            const d = new Date();
            const payload = {
                orderID: "TW"+d.getTime().toString().slice(-4),
                customerName: document.getElementById('custName').value,
                source: document.getElementById('source').value,
                receiver: document.getElementById('receiver').value,
                phone: document.getElementById('phone').value,
                fullAddress: document.getElementById('fullAddress').value,
                orderDate: `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`,
                items: Array.from(document.querySelectorAll('.item-row')).map(row => {
                    const loc = row.querySelector('.prodLoc').value;
                    return {
                        productName: row.querySelector('.prodName').value,
                        pickupLocation: loc,
                        amount: row.querySelector('.prodAmt').value,
                        paymentStatus: row.querySelector('.prodPayment').value,
                        status: '待取貨'
                    };
                })
            };
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload), mode: 'no-cors' });
            location.reload();
        }
    </script>
</body>
</html>
